# Edge reverse proxy — Apache on the host forwards 80/443 here (127.0.0.1:8094)
# Isolated from Xander (8090), XanderTech (8092), F&R (8093).

server_names_hash_bucket_size 128;

upstream pgsa_frontend {
    server frontend:80;
}

upstream pgsa_backend {
    server backend:80;
}

server {
    listen 80 default_server;
    server_name parrotglobalstudyacademy.ca www.parrotglobalstudyacademy.ca _;

    client_max_body_size 100M;

    # Same-origin /api must hit Laravel even when Host is the frontend domain
    location /api/ {
        proxy_pass http://pgsa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host api.parrotglobalstudyacademy.ca;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }

    location / {
        proxy_pass http://pgsa_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.parrotglobalstudyacademy.ca;

    client_max_body_size 100M;

    location / {
        proxy_pass http://pgsa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }
}
